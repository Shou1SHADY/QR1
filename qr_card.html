<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jimmy Adventures – QR Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #e8eaf0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      padding: 40px 16px;
    }

    .card {
      width: 340px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      background: #fff;
    }

    .card-top {
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      padding: 32px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #f6c90e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      border: 3px solid rgba(255,255,255,0.2);
    }

    .card-top h1 {
      color: #fff;
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
    }

    .card-top p {
      color: #a0aec0;
      font-size: 0.78rem;
      text-align: center;
    }

    .card-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .qr-wrap {
      width: 200px;
      height: 200px;
      border-radius: 16px;
      overflow: hidden;
      border: 4px solid #f0f0f0;
    }

    .qr-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .scan-label {
      font-size: 0.82rem;
      color: #666;
      text-align: center;
    }

    .scan-label strong {
      display: block;
      font-size: 0.95rem;
      color: #0f3460;
      margin-bottom: 2px;
    }

    .links-preview {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
    }

    .link-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #fff;
    }
    .ic-phone    { background: linear-gradient(135deg,#43e97b,#38f9d7); }
    .ic-tiktok   { background: linear-gradient(135deg,#010101,#69c9d0); }
    .ic-wa       { background: linear-gradient(135deg,#25d366,#128c7e); }
    .ic-insta    { background: linear-gradient(135deg,#f09433,#dc2743,#bc1888); }
    .ic-fb       { background: linear-gradient(135deg,#1877f2,#0d5ed9); }
    .ic-web      { background: linear-gradient(135deg,#f6c90e,#f0a500); }

    .divider {
      width: 100%;
      height: 1px;
      background: #f0f0f0;
    }

    .footer {
      font-size: 0.7rem;
      color: #bbb;
      text-align: center;
    }

    @media print {
      body { background: white; padding: 0; }
      .card { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-top">
      <div class="avatar">🌍</div>
      <h1>Jimmy Adventures</h1>
      <p>Scan to connect with us!</p>
    </div>
    <div class="card-body">
      <div class="qr-wrap">
        <img src="qr_jimmy_adventures.png" alt="QR Code" />
      </div>

      <div class="scan-label">
        <strong>Scan the QR Code</strong>
        to visit our links page
      </div>

      <div class="divider"></div>

        </div>

        </div>
        <div class="link-icon ic-web" title="Website">🌐</div>
      </div>

      <p class="footer">jimmysadventure.netlify.app</p>
    </div>
  </div>
</body>
</html>
