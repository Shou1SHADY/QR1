<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      width: 100px;
      height: 100px;
    }
    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f6c90e, #e94560, #0f3460);
      z-index: 0;
      animation: spin 4s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #f6c90e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      border: 3px solid #1a1a2e;
    }

    .name {
      color: #fff;
      font-size: 1.45rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.5px;
    }
    .bio {
      color: #a0aec0;
      font-size: 0.85rem;
      text-align: center;
      line-height: 1.5;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }
    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      background: rgba(255,255,255,0.06);
      transition: opacity 0.18s;
    }
    .link-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 28px rgba(0,0,0,0.35); }
    .link-btn:hover::after { opacity: 1; }
    .link-btn:active { transform: scale(0.98); }

    .icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.2rem;
    }

    /* Per-platform colours */
    .btn-phone   { border-left: 3px solid #43e97b; }
    .btn-phone   .icon { background: linear-gradient(135deg,#43e97b,#38f9d7); }
    .btn-tiktok  { border-left: 3px solid #010101; }
    .btn-tiktok  .icon { background: linear-gradient(135deg,#010101,#69c9d0); }
    .btn-whatsapp{ border-left: 3px solid #25d366; }
    .btn-whatsapp .icon { background: linear-gradient(135deg,#25d366,#128c7e); }
    .btn-insta   { border-left: 3px solid #e1306c; }
    .btn-insta   .icon { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
    .btn-fb      { border-left: 3px solid #1877f2; }
    .btn-fb      .icon { background: linear-gradient(135deg,#1877f2,#0d5ed9); }
    .btn-web     { border-left: 3px solid #f6c90e; }
    .btn-web     .icon { background: linear-gradient(135deg,#f6c90e,#f0a500); }

    .btn-label { flex: 1; }

    .arrow {
      font-size: 0.8rem;
      opacity: 0.5;
    }

    /* Footer */
    .footer {
      color: rgba(255,255,255,0.25);
      font-size: 0.72rem;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
